name: Scheduled Health Check

on:
  schedule:
    - cron: "0 19 * * *"  # 12:00 AM IST (00:00 IST) = 6:30 PM UTC previous day
    # Alternative: 30 18 * * * for 12:00 AM IST exactly
  workflow_dispatch:

permissions:
  contents: write

jobs:
  health_check_job:
    runs-on: ubuntu-latest
    name: Check all sites
    steps:
      - uses: actions/checkout@v4

      - name: Run Shell Script
        run: bash ./health-check.sh
